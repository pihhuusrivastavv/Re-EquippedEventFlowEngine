spring.application.name=Re-EquippedEventFlowEngine

# src/main/resources/application.properties

# Event queue size
eventflow.queue.capacity=50

# Max retries for consumers
eventflow.consumer.max-retries=3

# Number of consumer threads
eventflow.consumer.thread-count=2

# Producer event count
eventflow.producer.event-count=10

# Logging level
logging.level.com.anshika.Re_EquippedEventFlowEngine=INFO


# -----------------------------
# PostgreSQL Database Config
# -----------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/eventflowdb
spring.datasource.username=postgres
spring.datasource.password=gulluiloveusm143

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.show-sql=true